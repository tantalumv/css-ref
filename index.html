<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Ref</title>
  <link rel="stylesheet" href="https://unpkg.com/open-props"/>
  <link rel="stylesheet" href="dist/bundle.css">
</head>
<body
  data-signals="{query: '', activeCats: [], activeInterops: [], viewMode: 'grid', theme: 'dark', selectedProp: null, tableDisplayedCount: 0, tableTotalCount: 0, tableLoading: false}"
>

<!-- Inline SVG Icons (6 icons = ~2KB instead of 190KB font) -->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <defs>
    <symbol id="icon-filter" viewBox="0 0 24 24"><path fill="currentColor" d="M10 18h4v-2h-4v2zM3 6v2h18V6H3zm3 7h12v-2H6v2z"/></symbol>
    <symbol id="icon-grid" viewBox="0 0 24 24"><path fill="currentColor" d="M3 3h8v8H3V3zm0 10h8v8H3v-8zM13 3h8v8h-8V3zm0 10h8v8h-8v-8z"/></symbol>
    <symbol id="icon-table" viewBox="0 0 24 24"><path fill="currentColor" d="M3 3h18v18H3V3zm2 2v5h5V5H5zm7 0v5h5V5h-5zm-7 7v5h5v-5H5zm7 0v5h5v-5h-5z"/></symbol>
    <symbol id="icon-sun" viewBox="0 0 24 24"><path fill="currentColor" d="M12 1v2a9 9 0 1 0 0 18v2A11 11 0 1 1 12 1zm0 4a7 7 0 1 1 0 14 7 7 0 0 1 0-14zm0 2a5 5 0 1 0 0 10 5 5 0 0 0 0-10zM11 1h2v4h-2V1zm0 18h2v4h-2v-4zM3.515 4.929l1.414-1.414L7.05 5.636 5.636 7.05 3.515 4.93zM16.95 18.364l1.414-1.414 2.121 2.121-1.414 1.414-2.121-2.121zm2.121-14.85l1.414 1.415-2.121 2.121-1.414-1.414 2.121-2.122zM5.636 16.95l1.414 1.414-2.121 2.121-1.414-1.414 2.121-2.121zM23 11v2h-4v-2h4zM5 11v2H1v-2h4z"/></symbol>
    <symbol id="icon-moon" viewBox="0 0 24 24"><path fill="currentColor" d="M10 7a7 7 0 0 0 12 4.9v.1c0 5.523-4.477 10-10 10S2 17.523 2 12 6.477 2 12 2h.1A6.979 6.979 0 0 0 10 7zm-6 5a8 8 0 0 0 15.062 3.762A9 9 0 0 1 8.238 4.938 7.999 7.999 0 0 0 4 12z"/></symbol>
    <symbol id="icon-arrow-left" viewBox="0 0 24 24"><path fill="currentColor" d="M7.828 11H20v2H7.828l5.364 5.364-1.414 1.414L4 12l7.778-7.778 1.414 1.414L7.828 11z"/></symbol>
  </defs>
</svg>

<header data-show="!$selectedProp">
  <div class="brand" data-on:click="$selectedProp = null"><h1>CSS Ref</h1></div>
  
  <!-- Search -->
  <div class="search-combo">
    <input type="search" id="search" data-bind:query placeholder="Search properties… e.g. grid, animation, color" autocomplete="off" spellcheck="false">
  </div>

  <!-- Category Select -->
  <div class="select" data-show="!$selectedProp">
    <div class="selected" data-default="Category">
      <svg class="arrow" aria-hidden="true"><path d="M233.4 406.6c12.5 12.5 32.8 12.5 45.3 0l192-192c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L256 338.7 86.6 169.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3l192 192z"/></svg>
    </div>
    <div class="options">
      <div data-cat="">
        <input type="radio" name="category" id="cat-all" checked data-on:change="$activeCats = []">
        <label class="option" for="cat-all" data-txt="All"></label>
      </div>
      <div data-cat="Layout">
        <input type="radio" name="category" id="cat-Layout" data-on:change="$activeCats = ['Layout']">
        <label class="option" for="cat-Layout" data-txt="Layout"></label>
      </div>
      <div data-cat="Flexbox">
        <input type="radio" name="category" id="cat-Flexbox" data-on:change="$activeCats = ['Flexbox']">
        <label class="option" for="cat-Flexbox" data-txt="Flexbox"></label>
      </div>
      <div data-cat="Grid">
        <input type="radio" name="category" id="cat-Grid" data-on:change="$activeCats = ['Grid']">
        <label class="option" for="cat-Grid" data-txt="Grid"></label>
      </div>
      <div data-cat="Typography">
        <input type="radio" name="category" id="cat-Typography" data-on:change="$activeCats = ['Typography']">
        <label class="option" for="cat-Typography" data-txt="Typography"></label>
      </div>
      <div data-cat="Color">
        <input type="radio" name="category" id="cat-Color" data-on:change="$activeCats = ['Color']">
        <label class="option" for="cat-Color" data-txt="Color"></label>
      </div>
      <div data-cat="Sizing">
        <input type="radio" name="category" id="cat-Sizing" data-on:change="$activeCats = ['Sizing']">
        <label class="option" for="cat-Sizing" data-txt="Sizing"></label>
      </div>
      <div data-cat="Visual">
        <input type="radio" name="category" id="cat-Visual" data-on:change="$activeCats = ['Visual']">
        <label class="option" for="cat-Visual" data-txt="Visual"></label>
      </div>
      <div data-cat="Animation">
        <input type="radio" name="category" id="cat-Animation" data-on:change="$activeCats = ['Animation']">
        <label class="option" for="cat-Animation" data-txt="Animation"></label>
      </div>
      <div data-cat="Transform">
        <input type="radio" name="category" id="cat-Transform" data-on:change="$activeCats = ['Transform']">
        <label class="option" for="cat-Transform" data-txt="Transform"></label>
      </div>
      <div data-cat="Spacing">
        <input type="radio" name="category" id="cat-Spacing" data-on:change="$activeCats = ['Spacing']">
        <label class="option" for="cat-Spacing" data-txt="Spacing"></label>
      </div>
      <div data-cat="Interactivity">
        <input type="radio" name="category" id="cat-Interactivity" data-on:change="$activeCats = ['Interactivity']">
        <label class="option" for="cat-Interactivity" data-txt="Interactivity"></label>
      </div>
      <div data-cat="CSS Variables">
        <input type="radio" name="category" id="cat-CSS-Variables" data-on:change="$activeCats = ['CSS Variables']">
        <label class="option" for="cat-CSS-Variables" data-txt="CSS Variables"></label>
      </div>
      <div data-cat="Queries">
        <input type="radio" name="category" id="cat-Queries" data-on:change="$activeCats = ['Queries']">
        <label class="option" for="cat-Queries" data-txt="Queries"></label>
      </div>
    </div>
  </div>

  <!-- Interop Select -->
  <div class="select" data-show="!$selectedProp">
    <div class="selected" data-default="Interop">
      <svg class="arrow" aria-hidden="true"><path d="M233.4 406.6c12.5 12.5 32.8 12.5 45.3 0l192-192c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L256 338.7 86.6 169.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3l192 192z"/></svg>
    </div>
    <div class="options">
      <div data-status="">
        <input type="radio" name="interop" id="interop-all" checked data-on:change="$activeInterops = []">
        <label class="option" for="interop-all" data-txt="All"></label>
      </div>
      <div data-status="wide">
        <input type="radio" name="interop" id="interop-wide" data-on:change="$activeInterops = ['wide']">
        <label class="option" for="interop-wide" data-txt="Widely Available"></label>
      </div>
      <div data-status="b2024">
        <input type="radio" name="interop" id="interop-b2024" data-on:change="$activeInterops = ['b2024']">
        <label class="option" for="interop-b2024" data-txt="Baseline 2024"></label>
      </div>
      <div data-status="b2023">
        <input type="radio" name="interop" id="interop-b2023" data-on:change="$activeInterops = ['b2023']">
        <label class="option" for="interop-b2023" data-txt="Baseline 2023"></label>
      </div>
      <div data-status="b2022">
        <input type="radio" name="interop" id="interop-b2022" data-on:change="$activeInterops = ['b2022']">
        <label class="option" for="interop-b2022" data-txt="Baseline 2022"></label>
      </div>
      <div data-status="ltd">
        <input type="radio" name="interop" id="interop-ltd" data-on:change="$activeInterops = ['ltd']">
        <label class="option" for="interop-ltd" data-txt="Limited"></label>
      </div>
      <div data-status="exp">
        <input type="radio" name="interop" id="interop-exp" data-on:change="$activeInterops = ['exp']">
        <label class="option" for="interop-exp" data-txt="Experimental"></label>
      </div>
    </div>
  </div>

  <!-- View Mode Toggle -->
  <label class="view-switch big" title="Toggle view mode">
    <input class="cb" type="checkbox" 
      data-bind="$viewMode" 
      data-on:change="$viewMode = $viewMode === 'grid' ? 'table' : 'grid'"
      data-attr:checked="$viewMode === 'table'"
    />
    <span class="view-toggle-3d">
      <span class="left">Grid</span>
      <span class="right">Table</span>
    </span>
  </label>

  <!-- Theme Toggle (3D switch, 2x bigger) -->
  <label class="view-switch big" title="Toggle theme">
    <input class="cb" type="checkbox" 
      data-bind="$theme"
      data-on:change="$theme = $theme === 'dark' ? 'light' : 'dark'; document.documentElement.classList.toggle('dark', $theme === 'dark')"
      data-attr:checked="$theme === 'light'"
    />
    <span class="view-toggle-3d">
      <span class="left">Dark</span>
      <span class="right">Light</span>
    </span>
  </label>
</header>

<!-- Grid View - Declarative rendering with data-effect -->
<div id="grid-view" data-show="$viewMode === 'grid' && !$selectedProp">
  <main>
    <div id="grid" class="is-grid" data-effect="renderGrid(filtered($query, $activeCats, $activeInterops), $selectedProp)"></div>
  </main>
</div>

<!-- Table View - Using List.js -->
<div id="table-view" data-show="$viewMode === 'table' && !$selectedProp"
  data-effect="$viewMode; initListTable(filtered($query, $activeCats, $activeInterops))"
>
  <div id="table-container">
    <table class="list-table">
      <thead>
        <tr>
          <th class="sort" data-sort="prop-name">Property</th>
          <th class="sort" data-sort="prop-category">Category</th>
          <th class="sort" data-sort="prop-preview">Preview</th>
          <th class="sort" data-sort="prop-support">Support</th>
        </tr>
      </thead>
      <tbody class="list">
        <!-- Rows rendered by data-effect -->
      </tbody>
    </table>
  </div>
  <div id="table-sentinel" data-on-intersect__half="loadMoreTableRows()">Loading more...</div>
</div>

<!-- Detail View - Declarative with signals -->
<div id="detail-view" data-show="$selectedProp" data-class:open="$selectedProp">
  <div class="detail-wrap">
    <button class="back-btn" data-on:click="$selectedProp = null">
      <svg class="icon" aria-hidden="true"><use href="#icon-arrow-left"/></svg>
      All properties
    </button>
    
    <div class="detail-hero" data-show="$selectedProp">
      <div class="detail-name" data-text="$selectedProp ? $selectedProp.n : ''" data-style:color="$selectedProp ? CC[$selectedProp.c] || '#6366f1' : '#6366f1'"></div>
      <div class="detail-badges">
        <span class="cat-badge" data-text="$selectedProp ? $selectedProp.c : ''" data-style:background="$selectedProp ? CC[$selectedProp.c] || '#6366f1' : '#6366f1'"></span>
        <span class="availability-badge" data-text="$selectedProp ? IL[$selectedProp.i] : ''" data-class:="$selectedProp ? $selectedProp.i : ''"></span>
      </div>
    </div>
    
    <div class="detail-demo-box" data-show="$selectedProp">
      <div class="detail-demo-stage" data-html="$selectedProp ? $selectedProp.demo : ''"></div>
      <div class="detail-demo-label" data-text="$selectedProp && $selectedProp.x ? $selectedProp.x.split('\n')[0] : ''"></div>
    </div>

    <div class="detail-section" data-show="$selectedProp">
      <div class="detail-lbl">Description</div>
      <p class="detail-desc" data-text="$selectedProp ? $selectedProp.d : ''"></p>
    </div>

    <div class="detail-section" data-show="$selectedProp">
      <div class="detail-lbl">Syntax</div>
      <pre class="syntax-block" data-text="$selectedProp ? $selectedProp.x : ''"></pre>
    </div>

    <div class="detail-section" data-show="$selectedProp">
      <div class="detail-lbl">Browser Support</div>
      <div class="detail-browsers" data-html="$selectedProp ? renderBrowserSupport($selectedProp.s) : ''"></div>
    </div>

    <a class="mdn-link" data-show="$selectedProp" data-attr:href="$selectedProp ? 'https://developer.mozilla.org/en-US/docs/Web/CSS/' + $selectedProp.m : ''" target="_blank" rel="noopener">
      View on MDN →
    </a>
  </div>
</div>

<!-- Escape key handler -->
<div data-on:keydown__window="evt.key === 'Escape' && ($selectedProp = null)" style="display:none"></div>

<script src="dist/bundle.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/list.js/2.3.1/list.min.js"></script>
<script type="module" src="https://cdn.jsdelivr.net/gh/starfederation/datastar@1.0.0-RC.8/bundles/datastar.js"></script>
<script>
  document.documentElement.classList.add('dark');
</script>
</body>
</html>
