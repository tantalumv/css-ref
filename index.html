<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Ref</title>
  <link rel="stylesheet" href="https://unpkg.com/open-props"/>
  <link rel="stylesheet" href="dist/bundle.css">
  <style>
    /* List.js Table Styles */
    .list-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    .list-table th {
      background: var(--muted);
      color: var(--foreground);
      font-weight: 600;
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 0.05em;
      padding: 12px 8px;
      text-align: left;
      cursor: pointer;
      user-select: none;
    }
    .list-table th.sort:hover {
      background: var(--muted-foreground);
    }
    .list-table td {
      color: var(--foreground);
      padding: 0;
      border-bottom: 1px solid var(--muted);
    }
    .list-table tr:hover {
      background: var(--muted);
    }
    .prop-name {
      font-family: var(--font-mono);
      font-weight: 700;
      font-size: 14px;
      padding: 12px 8px;
      width: 120px;
    }
    .prop-category {
      font-size: 13px;
      font-weight: 600;
      color: var(--primary);
      padding: 12px 8px;
      width: 100px;
    }
    .prop-preview {
      width: 320px;
    }
    .preview-box {
      position: relative;
      width: 100%;
      height: 120px;
      overflow: hidden;
      background: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .preview-desc {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.9);
      color: #fff;
      padding: 12px;
      font-size: 13px;
      line-height: 1.5;
      opacity: 0;
      transition: opacity 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      pointer-events: none;
    }
    .preview-box:hover .preview-desc {
      opacity: 1;
    }
    .prop-support {
      padding: 12px 8px;
      text-align: center;
      width: 120px;
    }
    .support-icons {
      display: flex;
      gap: 3px;
      justify-content: center;
      transform: scale(0.9);
      margin-bottom: 6px;
    }
    .support-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted-foreground);
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }
    .table-row {
      cursor: pointer;
      transition: background 0.15s;
    }
    .table-row:hover {
      background: var(--muted);
    }
    /* Sorting indicators */
    .list-table th.asc::after {
      content: ' ▲';
    }
    .list-table th.desc::after {
      content: ' ▼';
    }
  </style>
</head>
<body
  data-signals="{query: '', activeCats: [], activeInterops: [], viewMode: 'grid', popoverOpen: false, theme: 'dark', selectedProp: null, tableDisplayedCount: 0, tableTotalCount: 0, tableLoading: false}"
>

<!-- Inline SVG Icons (6 icons = ~2KB instead of 190KB font) -->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <defs>
    <symbol id="icon-filter" viewBox="0 0 24 24"><path fill="currentColor" d="M10 18h4v-2h-4v2zM3 6v2h18V6H3zm3 7h12v-2H6v2z"/></symbol>
    <symbol id="icon-grid" viewBox="0 0 24 24"><path fill="currentColor" d="M3 3h8v8H3V3zm0 10h8v8H3v-8zM13 3h8v8h-8V3zm0 10h8v8h-8v-8z"/></symbol>
    <symbol id="icon-table" viewBox="0 0 24 24"><path fill="currentColor" d="M3 3h18v18H3V3zm2 2v5h5V5H5zm7 0v5h5V5h-5zm-7 7v5h5v-5H5zm7 0v5h5v-5h-5z"/></symbol>
    <symbol id="icon-sun" viewBox="0 0 24 24"><path fill="currentColor" d="M12 1v2a9 9 0 1 0 0 18v2A11 11 0 1 1 12 1zm0 4a7 7 0 1 1 0 14 7 7 0 0 1 0-14zm0 2a5 5 0 1 0 0 10 5 5 0 0 0 0-10zM11 1h2v4h-2V1zm0 18h2v4h-2v-4zM3.515 4.929l1.414-1.414L7.05 5.636 5.636 7.05 3.515 4.93zM16.95 18.364l1.414-1.414 2.121 2.121-1.414 1.414-2.121-2.121zm2.121-14.85l1.414 1.415-2.121 2.121-1.414-1.414 2.121-2.122zM5.636 16.95l1.414 1.414-2.121 2.121-1.414-1.414 2.121-2.121zM23 11v2h-4v-2h4zM5 11v2H1v-2h4z"/></symbol>
    <symbol id="icon-moon" viewBox="0 0 24 24"><path fill="currentColor" d="M10 7a7 7 0 0 0 12 4.9v.1c0 5.523-4.477 10-10 10S2 17.523 2 12 6.477 2 12 2h.1A6.979 6.979 0 0 0 10 7zm-6 5a8 8 0 0 0 15.062 3.762A9 9 0 0 1 8.238 4.938 7.999 7.999 0 0 0 4 12z"/></symbol>
    <symbol id="icon-arrow-left" viewBox="0 0 24 24"><path fill="currentColor" d="M7.828 11H20v2H7.828l5.364 5.364-1.414 1.414L4 12l7.778-7.778 1.414 1.414L7.828 11z"/></symbol>
  </defs>
</svg>

<header data-show="!$selectedProp">
  <div class="brand" data-on:click="$selectedProp = null"><h1>CSS Ref</h1><span class="brand-tag">2025</span></div>
  <div class="search-combo">
    <input type="search" id="search" data-bind:query placeholder="Search properties… e.g. grid, animation, color" autocomplete="off" spellcheck="false">
    <button class="filter-btn" id="filterBtn" title="Filters"
      data-on:click__stop="$popoverOpen = !$popoverOpen"
      data-class:has-active="$activeCats.length || $activeInterops.length"
    >
      <svg class="icon" aria-hidden="true"><use href="#icon-filter"/></svg>
      <span class="active-dot" data-show="$activeCats.length || $activeInterops.length"></span>
    </button>
    <div class="filter-popover" id="filterPopover"
      data-class:open="$popoverOpen"
      data-on:click__outside="$popoverOpen = false"
    >
      <div class="pop-section-label">Category</div>
      <div class="chip-group" id="catChips"
        data-on:click="evt.target.dataset.cat && ($activeCats = toggleInArray($activeCats, evt.target.dataset.cat))"
      >
        <button class="chip" data-cat="Layout" data-class:active="$activeCats.includes('Layout')" style="--cc: #8b5cf6">Layout</button>
        <button class="chip" data-cat="Flexbox" data-class:active="$activeCats.includes('Flexbox')" style="--cc: #06b6d4">Flexbox</button>
        <button class="chip" data-cat="Grid" data-class:active="$activeCats.includes('Grid')" style="--cc: #ec4899">Grid</button>
        <button class="chip" data-cat="Typography" data-class:active="$activeCats.includes('Typography')" style="--cc: #f59e0b">Typography</button>
        <button class="chip" data-cat="Color" data-class:active="$activeCats.includes('Color')" style="--cc: #10b981">Color</button>
        <button class="chip" data-cat="Sizing" data-class:active="$activeCats.includes('Sizing')" style="--cc: #6366f1">Sizing</button>
        <button class="chip" data-cat="Visual" data-class:active="$activeCats.includes('Visual')" style="--cc: #14b8a6">Visual</button>
        <button class="chip" data-cat="Animation" data-class:active="$activeCats.includes('Animation')" style="--cc: #f97316">Animation</button>
        <button class="chip" data-cat="Transform" data-class:active="$activeCats.includes('Transform')" style="--cc: #84cc16">Transform</button>
        <button class="chip" data-cat="Spacing" data-class:active="$activeCats.includes('Spacing')" style="--cc: #0ea5e9">Spacing</button>
        <button class="chip" data-cat="Interactivity" data-class:active="$activeCats.includes('Interactivity')" style="--cc: #d946ef">Interactivity</button>
        <button class="chip" data-cat="CSS Variables" data-class:active="$activeCats.includes('CSS Variables')" style="--cc: #64748b">CSS Variables</button>
        <button class="chip" data-cat="Queries" data-class:active="$activeCats.includes('Queries')" style="--cc: #a855f7">Queries</button>
      </div>
      <div class="pop-divider"></div>
      <div class="pop-section-label">Interop Status</div>
      <div class="chip-group" id="interopChips"
        data-on:click="evt.target.dataset.status && ($activeInterops = toggleInArray($activeInterops, evt.target.dataset.status))"
      >
        <button class="chip" data-status="wide" data-class:active="$activeInterops.includes('wide')" style="--cc: #22c55e">Widely Available</button>
        <button class="chip" data-status="b2024" data-class:active="$activeInterops.includes('b2024')" style="--cc: #3b82f6">Baseline 2024</button>
        <button class="chip" data-status="b2023" data-class:active="$activeInterops.includes('b2023')" style="--cc: #6366f1">Baseline 2023</button>
        <button class="chip" data-status="b2022" data-class:active="$activeInterops.includes('b2022')" style="--cc: #8b5cf6">Baseline 2022</button>
        <button class="chip" data-status="ltd" data-class:active="$activeInterops.includes('ltd')" style="--cc: #f59e0b">Limited</button>
        <button class="chip" data-status="exp" data-class:active="$activeInterops.includes('exp')" style="--cc: #ef4444">Experimental</button>
      </div>
      <div class="pop-footer">
        <button class="clear-btn" id="clearFilters"
          data-on:click="$activeCats = []; $activeInterops = []; $query = ''"
        >Clear all</button>
      </div>
    </div>
  </div>
  <div class="view-toggle">
    <button class="view-btn" id="btnGrid" title="Grid view"
      data-on:click="$viewMode = 'grid'"
      data-class:active="$viewMode === 'grid'"
    >
      <svg class="icon" aria-hidden="true"><use href="#icon-grid"/></svg>
    </button>
    <button class="view-btn" id="btnTable" title="Table view"
      data-on:click="$viewMode = 'table'"
      data-class:active="$viewMode === 'table'"
    >
      <svg class="icon" aria-hidden="true"><use href="#icon-table"/></svg>
    </button>
  </div>
  <span id="count" data-text="filtered($query, $activeCats, $activeInterops).length + ' / ' + filtered($query, $activeCats, $activeInterops).length"></span>
  
  <!-- Theme Toggle -->
  <button 
    class="theme-toggle"
    data-on:click="$theme = $theme === 'dark' ? 'light' : 'dark'; document.documentElement.classList.toggle('dark', $theme === 'dark')"
    title="Toggle theme"
    aria-label="Toggle dark/light mode"
  >
    <svg class="icon sun-icon" aria-hidden="true"><use href="#icon-sun"/></svg>
    <svg class="icon moon-icon" aria-hidden="true"><use href="#icon-moon"/></svg>
  </button>
</header>

<!-- Grid View - Declarative rendering with data-effect -->
<div id="grid-view" data-show="$viewMode === 'grid' && !$selectedProp">
  <main>
    <div id="grid" class="is-grid" data-effect="renderGrid(filtered($query, $activeCats, $activeInterops), $selectedProp)"></div>
  </main>
</div>

<!-- Table View - Using List.js -->
<div id="table-view" data-show="$viewMode === 'table' && !$selectedProp"
  data-effect="$viewMode; initListTable(filtered($query, $activeCats, $activeInterops))"
>
  <div id="table-container">
    <table class="list-table">
      <thead>
        <tr>
          <th class="sort" data-sort="prop-name">Property</th>
          <th class="sort" data-sort="prop-category">Category</th>
          <th class="sort" data-sort="prop-preview">Preview</th>
          <th class="sort" data-sort="prop-support">Support</th>
        </tr>
      </thead>
      <tbody class="list">
        <!-- Rows rendered by data-effect -->
      </tbody>
    </table>
  </div>
  <div id="table-sentinel" data-on-intersect__half="loadMoreTableRows()">Loading more...</div>
</div>

<!-- Detail View - Declarative with signals -->
<div id="detail-view" data-show="$selectedProp" data-class:open="$selectedProp">
  <div class="detail-wrap">
    <button class="back-btn" data-on:click="$selectedProp = null">
      <svg class="icon" aria-hidden="true"><use href="#icon-arrow-left"/></svg>
      All properties
    </button>
    
    <div class="detail-hero" data-show="$selectedProp">
      <div class="detail-name" data-text="$selectedProp ? $selectedProp.n : ''" data-style:color="$selectedProp ? CC[$selectedProp.c] || '#6366f1' : '#6366f1'"></div>
      <div class="detail-badges">
        <span class="cat-badge" data-text="$selectedProp ? $selectedProp.c : ''" data-style:background="$selectedProp ? CC[$selectedProp.c] || '#6366f1' : '#6366f1'"></span>
        <span class="availability-badge" data-text="$selectedProp ? IL[$selectedProp.i] : ''" data-class:="$selectedProp ? $selectedProp.i : ''"></span>
      </div>
    </div>
    
    <div class="detail-demo-box" data-show="$selectedProp">
      <div class="detail-demo-stage" data-html="$selectedProp ? $selectedProp.demo : ''"></div>
      <div class="detail-demo-label" data-text="$selectedProp && $selectedProp.x ? $selectedProp.x.split('\n')[0] : ''"></div>
    </div>

    <div class="detail-section" data-show="$selectedProp">
      <div class="detail-lbl">Description</div>
      <p class="detail-desc" data-text="$selectedProp ? $selectedProp.d : ''"></p>
    </div>

    <div class="detail-section" data-show="$selectedProp">
      <div class="detail-lbl">Syntax</div>
      <pre class="syntax-block" data-text="$selectedProp ? $selectedProp.x : ''"></pre>
    </div>

    <div class="detail-section" data-show="$selectedProp">
      <div class="detail-lbl">Browser Support</div>
      <div class="detail-browsers" data-html="$selectedProp ? renderBrowserSupport($selectedProp.s) : ''"></div>
    </div>

    <a class="mdn-link" data-show="$selectedProp" data-attr:href="$selectedProp ? 'https://developer.mozilla.org/en-US/docs/Web/CSS/' + $selectedProp.m : ''" target="_blank" rel="noopener">
      View on MDN →
    </a>
  </div>
</div>

<!-- Escape key handler -->
<div data-on:keydown__window="evt.key === 'Escape' && ($popoverOpen = false, $selectedProp = null)" style="display:none"></div>

<script src="dist/bundle.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/list.js/2.3.1/list.min.js"></script>
<script type="module" src="https://cdn.jsdelivr.net/gh/starfederation/datastar@1.0.0-RC.8/bundles/datastar.js"></script>
<script>
  document.documentElement.classList.add('dark');
</script>
</body>
</html>
